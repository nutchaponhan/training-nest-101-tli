version: "3.8"

services:
  postgres:
    image: postgres:16-alpine
    container_name: training-nest-101
    restart: unless-stopped
    ports:
      - "5555:5432"
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: training-nest-101
    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data:
